<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦾 Orçameintor</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />

    <style>
        :root {
            --primaria: #5aa897; --secundaria: #39ffb8; --fundo: #0d1413;
            --fundo-card: #162421; --texto: #d0f0e6; --borda: #2a4741; --perigo: #bc4749;
            --destaque: #f4a261; --fiscal: #4a90e2; --reuniao: #6b5baf;
        }
        /* MODO REUNIÃO - ESCONDE O QUE O CLIENTE NÃO PODE VER */
        body.privacy-mode .sensitive { filter: blur(10px); pointer-events: none; opacity: 0.2; }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { background: var(--fundo); color: var(--texto); font-family: 'Inter', sans-serif; margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 950px; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-left: 5px solid var(--primaria); padding-left: 20px; }
        h1 { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.8rem; color: var(--primaria); margin: 0; text-transform: uppercase; }

        .card { background: var(--fundo-card); padding: 25px; border-radius: 16px; border: 1px solid var(--borda); margin-bottom: 20px; position: relative; }
        .card-title { font-family: 'Orbitron'; font-size: 0.75rem; margin-bottom: 20px; color: var(--secundaria); text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center; }

        label { display: block; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; color: var(--primaria); }
        input, textarea, select { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--borda); border-radius: 8px; padding: 12px; color: var(--texto); font-family: 'Inter', sans-serif; margin-bottom: 15px; }

        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .item-row { display: grid; grid-template-columns: 3fr 80px 120px 40px; gap: 12px; margin-bottom: 10px; }

        .btn-main { background: var(--primaria); color: white; border: none; padding: 18px; border-radius: 12px; font-family: 'Orbitron', sans-serif; font-weight: 700; cursor: pointer; width: 100%; font-size: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn-main:hover { background: var(--secundaria); color: var(--fundo); }
        .btn-reuniao { background: var(--reuniao); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-size: 0.7rem; cursor: pointer; margin-bottom: 20px; font-family: 'Orbitron'; font-weight: bold; }

        .total-container { margin: 20px 0; padding: 35px; background: linear-gradient(135deg, #1a2a27 0%, var(--primaria) 100%); color: white; border-radius: 16px; text-align: right; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .total-value { font-family: 'Orbitron', sans-serif; font-size: 3rem; font-weight: 900; }

        #logo-preview { max-height: 50px; display: none; margin-bottom: 10px; border-radius: 5px; }
        .badge { font-size: 0.6rem; padding: 3px 10px; border-radius: 10px; background: var(--borda); color: var(--secundaria); font-weight: bold; }

        @media (max-width: 600px) { .grid-3, .grid-2, .item-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <button class="btn-reuniao" onclick="togglePrivacy()">👁️ MODO LUCRO RESTRITO (ESCONDER CUSTOS INTERNOS)</button>

        <header>
            <div>
                <h1>Orçameintor <span style="color: var(--secundaria)">Pro</span></h1>
                <div style="font-size: 0.6rem; opacity: 0.6; letter-spacing: 1px;"> | V2.3.0</div>
            </div>
            <div style="text-align: right;">
                <img id="logo-preview">
                <input type="file" id="file-logo" style="display:none" onchange="uploadLogo(this)">
                <label for="file-logo" style="cursor:pointer; color: var(--secundaria); font-size: 0.6rem;">[ ADICIONAR LOGOTIPO ]</label>
                <input type="text" id="revisao" value="REV 01" style="width: 80px; font-size: 0.7rem; text-align: center; margin-top: 5px; background: var(--borda); border:none; height: 25px;">
            </div>
        </header>

        <div class="card">
            <div class="card-title">📄 Identificação da Proposta</div>
            <div class="grid-2">
                <div><label>Cliente / Empresa Requisitante</label><input type="text" id="cliente" placeholder="Ex: Multinacional Logística S.A."></div>
                <div><label>Consultor Responsável</label><input type="text" id="profissional" placeholder="Seu Nome Completo"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📦 Escopo de Materiais e Serviços <span class="badge">PRODUTOS</span></div>
            <div id="listaItens"></div>
            <button style="background:none; border: 1px dashed var(--primaria); color: var(--primaria); width: 100%; padding: 12px; cursor: pointer; border-radius: 8px; font-weight: bold;" onclick="addItem()">+ INSERIR NOVO ITEM NO ESCOPO</button>
        </div>

        <div class="card sensitive" style="border-left: 4px solid var(--destaque);">
            <div class="card-title" style="color: var(--destaque);">⚙️ Engenharia de Custos e Logística <span class="badge">INTERNO</span></div>
            <div class="grid-3">
                <div><label>Prazo de Obra (Dias)</label><input type="number" id="dias" value="0" oninput="calc()"></div>
                <div><label>Tamanho da Equipe</label><input type="number" id="equipe" value="0" oninput="calc()"></div>
                <div><label>Diária por Pessoa (R$)</label><input type="number" id="vDiaria" value="0" oninput="calc()"></div>
            </div>
            <div class="grid-3">
                <div><label>Combustível (Total Obra)</label><input type="number" id="gasolina" value="0" oninput="calc()"></div>
                <div><label>Alimentação (Total Obra)</label><input type="number" id="almoco" value="0" oninput="calc()"></div>
                <div>
                    <label>Fator de Complexidade</label>
                    <select id="complexidade" onchange="calc()">
                        <option value="1">Padrão (Sem Adicional)</option>
                        <option value="1.05">Moderada (+5%)</option>
                        <option value="1.15">Alta (+15%)</option>
                        <option value="1.25">Risco Crítico (+25%)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card sensitive" style="border-left: 4px solid var(--fiscal);">
            <div class="card-title" style="color: var(--fiscal);">⚖️ Estratégia Fiscal e BDI <span class="badge">LUCRO</span></div>
            <div>
    <label>Margem de Segurança / Imprevistos (%)</label>
    <input type="number" id="seguranca" value="0" oninput="calc()">
</div>

            <div class="grid-2">
                <div><label>Margem de Lucro / BDI (%)</label><input type="number" id="margem" value="0" oninput="calc()"></div>
                <div><label>Impostos Sobre Nota (ISS/NF %)</label><input type="number" id="imposto" value="0" oninput="calc()"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📝 Detalhes Contratuais e Entrega</div>
            <div class="grid-2">
              
                <div><label>Validade da Proposta</label><input type="text" id="validade" value="15 dias úteis"></div>
                <div><label>Data Prevista de Início</label><input type="date" id="dataInicio"></div>
            </div>
            <label>Termos de Garantia e Condições de Pagamento</label>
            <textarea id="termos" rows="4">1. GARANTIA: 90 dias conforme CDC.
2. PAGAMENTO: 50% na aprovação e 50% na conclusão.
3. INFRAESTRUTURA: Por conta do contratante, salvo acordado em contrato.
4. CANCELAMENTO: Sujeito a multa de 20% após mobilização.</textarea>
            <label>Observações Técnicas</label>
            <textarea id="notas" rows="2" placeholder="Ex: Instalação após horário comercial..."></textarea>
        </div>

        <div class="total-container">
            <div style="font-size: 0.7rem; letter-spacing: 2px; opacity: 0.8;">VALOR TOTAL DO INVESTIMENTO</div>
            <div class="total-value">R$ <span id="resTotal">0,00</span></div>
        </div>

        <div class="grid-2">
            <button class="btn-main" onclick="gerarPDF()">📄 EMITIR PROPOSTA PROFISSIONAL (PDF)</button>
            <button class="btn-main" style="background: #111; border: 1px solid var(--borda); color: var(--primaria);" onclick="exportJSON()">💾 SALVAR BACKUP DO PROJETO</button>
        </div>
        <button class="btn-main" style="background: #25d366; color: white; margin-top: 10px;" onclick="enviarWhatsapp()">
    🟢 ENVIAR RESUMO POR WHATSAPP
</button>

    </div>

    <script>
        let itens = [];
        let base64Logo = "";

        // MODO PRIVACIDADE (BLUR NOS CUSTOS)
        function togglePrivacy() { document.body.classList.toggle('privacy-mode'); }

        // GESTÃO DE LOGOTIPO
        function uploadLogo(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    base64Logo = e.target.result;
                    const img = document.getElementById('logo-preview');
                    img.src = base64Logo; img.style.display = 'block';
                    salvar();
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // LÓGICA DE ITENS (ESCOPO)
        function addItem(n='', q=1, p=0) {
            itens.push({ id: Date.now(), n, q, p });
            render();
        }

        function u(id, f, v) {
            const i = itens.find(x => x.id === id);
            if(i) {
                i[f] = f === 'n' ? v : (parseFloat(v) || 0);
                calc();
            }
        }

        function rem(id) { 
            itens = itens.filter(x => x.id !== id); 
            render(); 
        }

        function render() {
            const cont = document.getElementById('listaItens');
            cont.innerHTML = '';
            itens.forEach(i => {
                const row = document.createElement('div');
                row.className = 'item-row';
                row.innerHTML = `
                    <input type="text" value="${i.n}" placeholder="Descrição do item/serviço" oninput="u(${i.id}, 'n', this.value)">
                    <input type="number" value="${i.q}" placeholder="Qtd" oninput="u(${i.id}, 'q', this.value)">
                    <div class="sensitive"><input type="number" value="${i.p}" placeholder="Custo R$" oninput="u(${i.id}, 'p', this.value)"></div>
                    <button style="background:transparent; border:none; color:var(--perigo); cursor:pointer; font-size:1.2rem;" onclick="rem(${i.id})">✕</button>
                `;
                cont.appendChild(row);
            });
            calc();
        }

        // ENGENHARIA DE CUSTOS (MATEMÁTICA N2)
        function calc() {
            const subProdutos = itens.reduce((acc, i) => acc + ((parseFloat(i.q)||0) * (parseFloat(i.p)||0)), 0);

            const d = parseFloat(document.getElementById('dias').value) || 0;
            const e = parseFloat(document.getElementById('equipe').value) || 0;
            const v = parseFloat(document.getElementById('vDiaria').value) || 0;
            const g = parseFloat(document.getElementById('gasolina').value) || 0;
            const a = parseFloat(document.getElementById('almoco').value) || 0;

            const custosOp = (d * e * v) + g + a;
            const complex = parseFloat(document.getElementById('complexidade').value) || 1;
            const margem = 1 + ((parseFloat(document.getElementById('margem').value) || 0) / 100);
            const imposto = 1 + ((parseFloat(document.getElementById('imposto').value) || 0) / 100);
            
            // Margem de segurança contra imprevistos
            const seguranca = 1 + ((parseFloat(document.getElementById('seguranca').value) || 0) / 100);

            // Cálculo em cascata: (Base + Logística) * Dificuldade * Lucro * Imposto * Segurança
            const totalFinal = (subProdutos + custosOp) * complex * margem * imposto * seguranca;

            document.getElementById('resTotal').innerText = totalFinal.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            salvar();
        }

        // EMISSÃO DE PDF PROFISSIONAL
        function gerarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            const bdi = 1 + ((parseFloat(document.getElementById('margem').value)||0) / 100);
            const imp = 1 + ((parseFloat(document.getElementById('imposto').value)||0) / 100);
            const comp = parseFloat(document.getElementById('complexidade').value) || 1;
            const seg = 1 + ((parseFloat(document.getElementById('seguranca').value) || 0) / 100);
            
            // Fator final agora inclui a segurança para o PDF bater com o site
            const fatorFinal = bdi * imp * comp * seg;

            doc.setFillColor(13, 20, 19); doc.rect(0, 0, 210, 40, 'F');
            if(base64Logo) doc.addImage(base64Logo, 'JPEG', 170, 5, 30, 30);

            doc.setTextColor(90, 168, 151); doc.setFontSize(18); doc.setFont(undefined, 'bold');
            doc.text("PROPOSTA COMERCIAL", 15, 20);

            doc.setTextColor(200); doc.setFontSize(8); doc.setFont(undefined, 'normal');
            doc.text(`EMISSOR: ${document.getElementById('profissional').value.toUpperCase()}`, 15, 28);
            doc.text(`REVISÃO: ${document.getElementById('revisao').value} | DATA: ${new Date().toLocaleDateString('pt-BR')}`, 15, 33);

            doc.setTextColor(40); doc.setFontSize(10);
            doc.text(`CLIENTE: ${document.getElementById('cliente').value.toUpperCase()}`, 15, 50);
            doc.line(15, 52, 195, 52);

            let y = 65;
            doc.setFont(undefined, 'bold');
            doc.text("DESCRIÇÃO TÉCNICA", 15, y); doc.text("VALOR TOTAL (R$)", 165, y);
            y += 5; doc.line(15, y, 195, y);
            y += 10;

            doc.setFont(undefined, 'normal');
            itens.forEach(i => {
                const totalExibido = (i.q * i.p) * fatorFinal;
                doc.text(`${i.n || 'Serviço/Produto'} (x${i.q})`, 15, y);
                doc.text(totalExibido.toLocaleString('pt-BR', {minimumFractionDigits: 2}), 165, y);
                y += 8;
                if(y > 270) { doc.addPage(); y = 20; }
            });

            const dObra = parseFloat(document.getElementById('dias').value) || 0;
            if(dObra > 0) {
                const totalLog = ( (dObra * (parseFloat(document.getElementById('equipe').value)||0) * (parseFloat(document.getElementById('vDiaria').value)||0)) + (parseFloat(document.getElementById('gasolina').value)||0) + (parseFloat(document.getElementById('almoco').value)||0) ) * fatorFinal;
                doc.text(`Mão de Obra e Mobilização Técnica (${dObra} dias)`, 15, y);
                doc.text(totalLog.toLocaleString('pt-BR', {minimumFractionDigits: 2}), 165, y);
                y += 15;
            }

            doc.setFillColor(90, 168, 151); doc.rect(140, y-6, 55, 12, 'F');
            doc.setTextColor(255); doc.setFontSize(12); doc.setFont(undefined, 'bold');
            doc.text(`TOTAL: R$ ${document.getElementById('resTotal').innerText}`, 142, y + 2);

            y += 25;
            doc.setTextColor(40); doc.setFontSize(9); doc.text("CONDIÇÕES E GARANTIA:", 15, y);
            doc.setFont(undefined, 'normal');
            const termos = doc.splitTextToSize(document.getElementById('termos').value, 175);
            doc.text(termos, 15, y + 6);

            const observacoes = document.getElementById('notas').value;
            if(observacoes) {
                y += (termos.length * 5) + 10;
                doc.setFont(undefined, 'bold'); doc.text("OBSERVAÇÕES:", 15, y);
                doc.setFont(undefined, 'normal'); doc.text(observacoes, 15, y + 5);
            }

            doc.save(`Orcamento_${document.getElementById('cliente').value.replace(/\s+/g, '_') || 'Biel'}.pdf`);
        }

        // PERSISTÊNCIA DE DADOS (LOCALSTORAGE)
        function salvar() {
            const data = {
                cli: document.getElementById('cliente').value, prof: document.getElementById('profissional').value,
                rev: document.getElementById('revisao').value, dias: document.getElementById('dias').value,
                eq: document.getElementById('equipe').value, vd: document.getElementById('vDiaria').value,
                gas: document.getElementById('gasolina').value, alm: document.getElementById('almoco').value,
                comp: document.getElementById('complexidade').value, mrg: document.getElementById('margem').value,
                imp: document.getElementById('imposto').value, 
                seg: document.getElementById('seguranca').value, // SALVANDO SEGURANÇA
                term: document.getElementById('termos').value,
                notas: document.getElementById('notas').value, val: document.getElementById('validade').value,
                dt: document.getElementById('dataInicio').value, itens: itens, logo: base64Logo
            };
            localStorage.setItem('orc_pro_v3', JSON.stringify(data));
        }

        function carregar() {
            const saved = localStorage.getItem('orc_pro_v3');
            if(saved) {
                const d = JSON.parse(saved);
                document.getElementById('cliente').value = d.cli || '';
                document.getElementById('profissional').value = d.prof || '';
                document.getElementById('revisao').value = d.rev || 'REV 01';
                document.getElementById('dias').value = d.dias || 0;
                document.getElementById('equipe').value = d.eq || 0;
                document.getElementById('vDiaria').value = d.vd || 0;
                document.getElementById('gasolina').value = d.gas || 0;
                document.getElementById('almoco').value = d.alm || 0;
                document.getElementById('complexidade').value = d.comp || 1;
                document.getElementById('margem').value = d.mrg || 0;
                document.getElementById('imposto').value = d.imp || 0;
                document.getElementById('seguranca').value = d.seg || 0; // CARREGANDO SEGURANÇA
                document.getElementById('termos').value = d.term || '';
                document.getElementById('notas').value = d.notas || '';
                document.getElementById('validade').value = d.val || '15 dias úteis';
                document.getElementById('dataInicio').value = d.dt || '';
                itens = d.itens || [];
                if(d.logo) { base64Logo = d.logo; document.getElementById('logo-preview').src = d.logo; document.getElementById('logo-preview').style.display = 'block'; }
                render();
            }
        }

        function exportJSON() {
            const blob = new Blob([localStorage.getItem('orc_pro_v3')], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `PROJETO_ORC_${document.getElementById('cliente').value || 'BACKUP'}.json`; a.click();
        }
        
        function enviarWhatsapp() {
            const cliente = document.getElementById('cliente').value || "Cliente";
            const total = document.getElementById('resTotal').innerText;
            const profissional = document.getElementById('profissional').value || "Consultor";
            
            const mensagem = `Olá ${cliente}! 🦾%0A%0A` +
                `Aqui é o ${profissional}. Acabei de gerar a proposta técnica para o seu projeto.%0A%0A` +
                `*Valor Total do Investimento: R$ ${total}*%0A%0A` +
                `Estou te enviando o PDF com todos os detalhes e prazos agora mesmo. Alguma dúvida?`;

            window.open(`https://wa.me/?text=${mensagem}`, '_blank');
        }

        window.onload = carregar;
    </script>

</body>
</html>
